<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Natasha Daas</title>
    <script>
      // GitHub Pages SPA redirect: encode the path into the query string
      // so index.html can restore it via the History API.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
